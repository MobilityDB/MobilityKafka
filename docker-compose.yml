services:
  kafka:
    image: confluentinc/cp-kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 5s
      timeout: 10s
      retries: 10

  kafka-setup:
    image: confluentinc/cp-kafka:latest
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic query-input --partitions 1 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic query-output --partitions 1 --replication-factor 1
      echo 'Topics created.'
      "
   #Producer version for the Examples.WordCountExample
#  producer:
#    image: confluentinc/cp-kafka:latest
#    depends_on:
#      kafka-setup:
#        condition: service_completed_successfully
#    entrypoint: [ "/bin/sh", "-c" ]
#    command: [ "echo 'hello world hello kafka the quick brown fox jumps over the lazy dog' | kafka-console-producer --bootstrap-server kafka:9092 --topic wordcount-input" ]

  #Producer version for AIS Data or SNCB Data
  producer:
    image: confluentinc/cp-kafka:latest
    depends_on:
      kafka-setup:
        condition: service_completed_successfully
    volumes:
      - ./ais_instants.csv:/ais_instants.csv # mount your CSV file
      - ./input_sncb.csv:/input_sncb.csv
    entrypoint: [ "/bin/sh", "-c" ]
    # DATASET is set by run_query.sh: "ais" or "sncb"
    command: [ "cat /${DATASET:-input_sncb}.csv | kafka-console-producer --bootstrap-server kafka:9092 --topic query-input" ]
    # Commands if you want to run the queries by hand without the scripts
    #command: [ "cat /ais_instants.csv | kafka-console-producer --bootstrap-server kafka:9092 --topic query-input" ] #AISData versiom
    #command: [ "cat /input_sncb.csv | kafka-console-producer --bootstrap-server kafka:9092 --topic query-input" ] #SNCB Data version

  consumer:
    image: confluentinc/cp-kafka:latest
    depends_on:
      kafka-setup:
        condition: service_completed_successfully
    entrypoint: [ "/bin/sh", "-c" ]
    command: [ "kafka-console-consumer --bootstrap-server kafka:9092 --topic query-output --from-beginning --formatter-property print.key=true --formatter-property key.separator=' -> '" ]

  query-app:
    # Uses the pre-built image from run_query.sh — do NOT add "build:" here
    # Docker command if you don't want to use the script (adapt the Dockerfile to your needs) :
    # docker build -f Dockerfile_q8_meos_kalman -t query-app .
    image: query-app
    depends_on:
      kafka-setup:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092