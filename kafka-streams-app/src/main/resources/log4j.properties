# Minimal log4j config for the MobilityKafka scaffold

log4j.rootLogger=WARN, stdout

log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
log4j.appender.stdout.layout.ConversionPattern=%d{HH:mm:ss.SSS} [%t] %-5p %c{1} - %m%n

log4j.logger.berlinmod=INFO

# Kafka-Streams internals at WARN to keep test output readable
log4j.logger.org.apache.kafka=WARN
log4j.logger.org.apache.kafka.streams=WARN
