name: CI/CD MobilityKafka

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, dev ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ── Job 1 : quick compilation (no MEOS, just Java syntax) ────────────
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Install JMEOS stub in local Maven repo
        run: |
          mvn install:install-file \
            -Dfile=jar/JMEOS.jar \
            -DgroupId=org.jmeos \
            -DartifactId=jmeos \
            -Dversion=1.0-SNAPSHOT \
            -Dpackaging=jar

      - name: Compile (sans tests)
        run: mvn compile -DskipTests

  # ── Job 2 : Docker build (MEOS + Maven package) ───────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: compile
    permissions:
      contents: read
      packages: write

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ github.sha }}

  # ── Job 3 : Integrations tests ────────────────────────────────────────────
  integration-test:
    runs-on: ubuntu-latest
    needs: docker-build

    strategy:
      matrix:
        query: [1, 2, 3, 4, 5, 6, 7, 8, 9]
        exclude:
          - query: 5
          - query: 6
          - query: 7
          - query: 8
          - query: 9
      fail-fast: false

    name: "Integration test — Query ${{ matrix.query }}"

    steps:
      - uses: actions/checkout@v4

      - name: Set mainClass for Query${{ matrix.query }}
        run: |
          sed -i 's|<mainClass>.*</mainClass>|<mainClass>Queries.Query${{ matrix.query }}_Main</mainClass>|' pom.xml

      - name: Start stack
        run: docker compose up -d --build
        timeout-minutes: 10

      - name: Wait for producer to finish
        run: |
          docker compose wait producer || true
          sleep 15  

      - name: Check output for alerts
        run: |
          OUTPUT=$(docker compose logs consumer 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "\[Q${{ matrix.query }}\]" && echo "Query${{ matrix.query }} output found" || (echo "No output for Query${{ matrix.query }}" && exit 1)

      - name: Teardown
        if: always()
        run: docker compose down -v