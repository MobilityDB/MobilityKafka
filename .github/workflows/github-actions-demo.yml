name: CI/CD MobilityKafka

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, dev ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ── Job 1 : quick compilation (no MEOS, just Java syntax) ────────────
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Install JMEOS stub in local Maven repo
        run: |
          mvn install:install-file \
            -Dfile=jar/JMEOS.jar \
            -DgroupId=org.jmeos \
            -DartifactId=jmeos \
            -Dversion=1.0-SNAPSHOT \
            -Dpackaging=jar

      - name: Compile (sans tests)
        run: mvn compile -DskipTests

  # ── Job 2 : Docker build (MEOS + Maven package) ───────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: compile
    permissions:
      contents: read
      packages: write

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ github.sha }}

  # ── Job 3 : Integrations tests ────────────────────────────────────────────
  integration-test:
    runs-on: ubuntu-latest
    needs: docker-build
    #timeout-minutes: 15

    strategy:
      matrix:
        include:
          - query: 1
            alert_pattern: "[Q1]"
            csv: ais_instants.csv
          - query: 2
            alert_pattern: "[Q2]"
            csv: ais_instants.csv
          - query: 3
            alert_pattern: "[Q3]"
            csv: ais_instants.csv
          - query: 4
            alert_pattern: "[Q4]"
            csv: ais_instants.csv
          - query: 5
            alert_pattern: "[Q5]"
            csv: ais_instants.csv
          # - query: 6
          #   alert_pattern: "[Q6]"
          #   csv: ais_instants.csv
          # - query: 7
          #   alert_pattern: "[Q7]"
          #   csv: ais_instants.csv
          # - query: 8
          #   alert_pattern: "[Q8]"
          #   csv: ais_instants.csv
          # - query: 9
          #   alert_pattern: "[Q9]"
          #   csv: ais_instants.csv
      fail-fast: false   # ne pas annuler les autres queries si une échoue

    name: "Integration test — Query ${{ matrix.query }}"


    steps:
      - uses: actions/checkout@v4

      - name: Set mainClass for Query${{ matrix.query }}
        run: |
          sed -i 's|<mainClass>.*</mainClass>|<mainClass>Queries.Query${{ matrix.query }}_Main</mainClass>|' pom.xml

      - name: Start stack
        run: docker compose up -d --build
        timeout-minutes: 10

      - name: Wait for producer to finish
        run: |
          docker compose wait producer
          sleep 15  

      - name: Check output for alerts
        run: |
          OUTPUT=$(docker compose logs consumer 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "${{ matrix.alert_pattern }}" \
          && echo "Query${{ matrix.query }} — output found" \
          || (echo "Query${{ matrix.query }} — no output detected" && exit 1)

      - name: Teardown
        if: always()
        run: docker compose down -v